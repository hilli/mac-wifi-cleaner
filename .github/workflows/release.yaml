name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "**"

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
      - name: Release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conclusion:
    name: Release Conclusion
    runs-on: ubuntu-24.04
    needs: release
    if: always()
    steps:
      - name: Check release result
        if: needs.release.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release workflow failed for ${context.ref}`,
              body: `The release workflow failed.\n\n` +
                    `**Run:** ${runUrl}\n` +
                    `**Ref:** \`${context.ref}\`\n` +
                    `**SHA:** \`${context.sha}\`\n`,
              labels: ['bug']
            });
            core.setFailed('Release failed — issue created.');
      - name: Release succeeded
        if: needs.release.result == 'success'
        run: echo "✅ Release completed successfully."
